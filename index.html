<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>AgroFuturo</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <h1>🌱 AgroFuturo Sustentável</h1>

    <p class="subtitle">
      Aprenda como os agrotóxicos afetam o meio ambiente,
      a água, os alimentos e a saúde das pessoas.
    </p>

    <img
      id="gameImage"
      class="main-image"
      src="https://images.unsplash.com/photo-1464226184884-fa280b87c399?q=80&w=1200&auto=format&fit=crop"
    >

    <div class="card">

      <h2 id="title">
        Bem-vindo ao AgroFuturo
      </h2>

      <p id="text">
        Sua comunidade precisa cultivar alimentos sem destruir a natureza.
      </p>

      <div class="buttons">

        <button id="btn1">
          Escolha 1
        </button>

        <button id="btn2" class="danger">
          Escolha 2
        </button>

      </div>

    </div>

    <div class="stats">

      <div class="stat">
        🌾 Produção:
        <span id="food">70</span>
      </div>

      <div class="stat">
        🌳 Natureza:
        <span id="nature">70</span>
      </div>

      <div class="stat">
        💧 Água:
        <span id="water">70</span>
      </div>

      <div class="stat">
        ❤️ Saúde:
        <span id="health">70</span>
      </div>

    </div>

    <div class="message" id="message">
      Faça escolhas sustentáveis.
    </div>

    <button id="restart" class="restart">
      🔄 Reiniciar
    </button>

  </div>

  <script src="script.js"></script>

</body>
</html>
